name: mental_math_marathon
description: "Train your brain. Race against time. Master mental math."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Local Storage
  shared_preferences: ^2.3.4

  # (Ads placeholder - not yet implemented)

  # Sounds
  audioplayers: ^6.1.0

  # Charts
  fl_chart: ^0.69.2

  # Animations
  lottie: ^3.1.3

  # Intl
  intl: ^0.20.2

  # Device Preview
  device_preview_plus: ^2.8.3


  # Notifications
  flutter_local_notifications: ^17.2.4

  # Timezone (required for scheduled notifications)
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/App_Logo.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/images/App_Logo.png"
  adaptive_icon_inset: 8
  web:
    generate: true
    image_path: "assets/images/App_Logo.png"
  windows:
    generate: true
    image_path: "assets/images/App_Logo.png"
  macos:
    generate: true
    image_path: "assets/images/App_Logo.png"
  linux:
    generate: true
    image_path: "assets/images/App_Logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/sounds/sound/
    - assets/lottie/
